name: GeekNews 주간 뉴스 봇

on:
  schedule:
    # 매주 월요일 KST 09:00 (= UTC 00:00)
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY RUN (Telegram 전송 생략)"
        type: boolean
        default: false

jobs:
  run-weekly-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 전송 기록 캐시 복원 ──────────────────────────────────
      - name: Restore sent weekly cache
        uses: actions/cache@v4
        with:
          path: sent_weekly.json
          key: sent-weekly-${{ runner.os }}
          restore-keys: sent-weekly-

      # ── 3. Python 설정 ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 4. 봇 실행 ───────────────────────────────────────────
      - name: Run weekly bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN:            ${{ inputs.dry_run || 'false' }}
        run: python weekly_bot.py

      # ── 5. 전송 기록 캐시 저장 ──────────────────────────────────
      - name: Save sent weekly cache
        if: always()
        uses: actions/cache@v4
        with:
          path: sent_weekly.json
          key: sent-weekly-${{ runner.os }}-${{ github.run_id }}
